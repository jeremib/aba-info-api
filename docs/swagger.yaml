basePath: /
definitions:
  main.bank:
    properties:
      address:
        type: string
      bank:
        type: string
      city:
        type: string
      message:
        type: string
      phone:
        type: string
      routing_number:
        type: string
      state:
        type: string
      zip:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for looking up bank information by routing number
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Routing Number API
  version: "1.0"
paths:
  /banks:
    get:
      description: Get a list of all banks with their routing numbers and information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.bank'
            type: array
      summary: List all banks
      tags:
      - banks
  /banks/{routing}:
    get:
      description: Get bank information for a specific routing number
      parameters:
      - description: Routing Number
        in: path
        name: routing
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.bank'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get bank by routing number
      tags:
      - banks
  /health:
    get:
      description: Check if the API is running
      produces:
      - application/json
      responses:
        "200":
          description: up
          schema:
            type: string
      summary: Health check
      tags:
      - health
swagger: "2.0"
